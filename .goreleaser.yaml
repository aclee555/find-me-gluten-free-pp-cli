version: 2
project_name: find-me-gluten-free-pp-cli
changelog:
  disable: true
builds:
  - id: find-me-gluten-free-pp-cli
    main: ./cmd/find-me-gluten-free-pp-cli
    binary: find-me-gluten-free-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X find-me-gluten-free-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: find-me-gluten-free-pp-mcp
    main: ./cmd/find-me-gluten-free-pp-mcp
    binary: find-me-gluten-free-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: find-me-gluten-free-pp-cli
    repository:
      owner: aclee555
      name: homebrew-tap
    homepage: "https://github.com/aclee555/find-me-gluten-free-pp-cli"
    description: "A celiac trip-planner's terminal companion: every Find Me Gluten Free city, cached locally with cross-city compare,..."
    install: |
      bin.install "find-me-gluten-free-pp-cli"
      bin.install "find-me-gluten-free-pp-mcp"
